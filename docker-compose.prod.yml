version: '3.9'

services:
  # ─── .NET API ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      MongoDB__ConnectionString: mongodb://root:${MONGO_PASSWORD}@mongodb:27017
      MongoDB__DatabaseName: fitplan_prod
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: fitplan-api
      Jwt__Audience: fitplan-client
      Smtp__Host: ${SMTP_HOST}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__Username: ${SMTP_USERNAME}
      Smtp__Password: ${SMTP_PASSWORD}
      Smtp__From: ${SMTP_FROM}
      Google__ClientId: ${GOOGLE_CLIENT_ID}
      Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}
      Google__RedirectUri: ${GOOGLE_REDIRECT_URI}
      FrontendUrl: ${FRONTEND_URL}
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fitplan-net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # ─── Vue 3 Frontend (nginx, serves SPA + proxies /api) ───
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - fitplan-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  # ─── MongoDB ──────────────────────────────────────────────
  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: fitplan_prod
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - fitplan-net

volumes:
  mongodb_data:

networks:
  fitplan-net:
    driver: bridge
